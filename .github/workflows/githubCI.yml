name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: '0 3 * * *'  # Ejecuta el backup todos los días a las 3am UTC
  workflow_dispatch:     # Permite ejecutar manualmente el workflow

jobs:
  # EsLint
  lint-project:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm install
      - name: Run eslint
        run: npm run lint

  # Build
  build-project:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-project
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

  # Vitest
  test-vitest:
    name: Test with Coverage
    runs-on: ubuntu-latest
    needs: build-project
    strategy:
      matrix:
        branch:
          - ${{ github.head_ref }}
          - "develop"
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ matrix.branch }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - name: Install dependencies
        run: npm install
      - name: Run tests with coverage
        run: npm run test
      - name: Sanitize branch name
        id: sanitize
        run: echo "BRANCH_NAME=${{ matrix.branch }}" | sed 's/\//-/g' >> $GITHUB_ENV
      - name: "Upload Coverage"
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ env.BRANCH_NAME }}
          path: coverage

  # Coverage
  report-coverage:
    needs: test-vitest
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/production' && github.ref != 'refs/heads/develop'
    steps:
      - name: Sanitize branch name
        id: sanitize
        run: echo "BRANCH_NAME=${GITHUB_HEAD_REF}" | sed 's/\//-/g' >> $GITHUB_ENV
      - name: "Download Coverage for Current Branch"
        uses: actions/download-artifact@v4
        with:
          name: coverage-${{ env.BRANCH_NAME }}
          path: coverage
      - name: "Download Coverage for Develop Branch"
        uses: actions/download-artifact@v4
        with:
          name: coverage-develop
          path: coverage-develop
      - name: 'Report Coverage'
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          github-token: ${{ secrets.ACCOUNT_TOKEN }}
          json-summary-compare-path: coverage-develop/coverage-summary.json

  # Deploy
  deploy-project:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-project
    if: github.ref == 'refs/heads/production'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Deploy to Vercel
        run: vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes

  # Backup Neon DB
  backup-database:
    name: Backup Neon DB to Repo
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Parse Neon DB URL and Dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          regex="postgres://([^:]+):([^@]+)@([^/]+)/(.+)"
          if [[ $DATABASE_URL =~ $regex ]]; then
            PGUSER="${BASH_REMATCH[1]}"
            PGPASSWORD="${BASH_REMATCH[2]}"
            PGHOST="${BASH_REMATCH[3]}"
            PGDATABASE="${BASH_REMATCH[4]}"
          else
            echo "Error: no se pudo interpretar DATABASE_URL"
            exit 1
          fi

          export PGPASSWORD

          TIMESTAMP=$(date +%F_%H-%M)
          mkdir -p backups
          pg_dump -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" > "backups/backup_$TIMESTAMP.sql"

      - name: Commit and push backup
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add backups/
          git commit -m "Backup on $(date +%F_%H-%M)" || echo "Nothing to commit"
          git push
